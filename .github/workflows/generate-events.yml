name: Generate Sports Events JSON

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'generate_events.py'
      - '.github/workflows/generate-events.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create output directory
        run: mkdir -p app-files

      - name: Run event generator
        run: python generate_events.py

      - name: Verify output
        run: |
          echo "============================================"
          echo "         OUTPUT VERIFICATION"
          echo "============================================"
          python3 << 'PYEOF'
          import json

          with open('app-files/events.json', 'r') as f:
              data = json.load(f)

          print(f"\nTotal events: {len(data)}\n")

          sports = {}
          for e in data:
              s = e.get('sportType', 'Unknown')
              sports[s] = sports.get(s, 0) + 1

          print("Sport Type Breakdown:")
          for s, c in sorted(sports.items(), key=lambda x: -x[1]):
              print(f"  {s:20s} : {c}")

          default_url = "https://github.com/farhad-iptv/app-link/raw/refs/heads/main/FREEFLIX-extended.mp4"
          no_time = sum(1 for e in data if not e.get('startTime'))
          real = sum(1 for e in data if any(s['url'] != default_url for s in e.get('streams', [])))
          print(f"\nEvents with time    : {len(data) - no_time}")
          print(f"Events without time : {no_time}")
          print(f"Events with streams : {real}")

          # Verify league names
          print("\nLeague name samples:")
          seen = set()
          for e in data:
              lg = e.get('league', '')
              if lg and lg not in seen:
                  seen.add(lg)
                  if len(seen) <= 15:
                      sp = e.get('sportType', '?')
                      print(f"  [{sp:12s}] {lg}")

          # Show sample events
          print("\nSample events:")
          print("-" * 110)
          for e in data[:8]:
              st = e.get('sportType', '?')[:12]
              h = e.get('homeTeamName', '?')[:16]
              a = e.get('awayTeamName', '?')[:16]
              t = e.get('startTime', 'NO TIME')[:22]
              lg = e.get('league', '?')[:22]
              sc = len(e.get('streams', []))
              print(f"  [{st:12s}] {h:16s} vs {a:16s} | {lg:22s} | {t:22s} | {sc} streams")
          print("-" * 110)

          # Cricket check
          cricket = [e for e in data if e.get('sportType') == 'Cricket']
          if cricket:
              print(f"\nCricket ({len(cricket)}):")
              for e in cricket:
                  h = e.get('homeTeamName', '?')[:20]
                  a = e.get('awayTeamName', '?')[:20]
                  lg = e.get('league', '?')[:20]
                  t = e.get('startTime', 'NO TIME')
                  print(f"  {h:20s} vs {a:20s} | {lg:20s} | {t}")
          PYEOF

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add app-files/events.json

          if git diff --staged --quiet; then
            echo "✓ No changes"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            EVENT_COUNT=$(python3 -c "import json; print(len(json.load(open('app-files/events.json'))))")
            SPORT_SUMMARY=$(python3 -c "
          import json
          data = json.load(open('app-files/events.json'))
          sports = {}
          for e in data:
              s = e.get('sportType', '?')
              sports[s] = sports.get(s, 0) + 1
          parts = [f'{v} {k}' for k, v in sorted(sports.items(), key=lambda x: -x[1])[:4]]
          print(', '.join(parts))
          ")
            git commit -m "🏆 Update events.json — ${EVENT_COUNT} events [${TIMESTAMP}]" \
                        -m "Breakdown: ${SPORT_SUMMARY}"
            git push
            echo "✓ Pushed"
          fi
